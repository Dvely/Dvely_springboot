name: Deploy to EC2

# v로 시작하는 태그를 푸시할 때만 배포한다. (예: v1.0.0)
# 브랜치 푸시나 PR로는 실행되지 않는다.
on:
  push:
    tags:
      - 'v*'

# 태그를 연달아 밀어도 배포가 겹치지 않게 직렬화한다.
# 배포 도중 취소하면 EC2가 어중간한 상태로 남으므로 cancel-in-progress는 끈다.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

permissions:
  contents: read

env:
  # 배포 대상 경로(/opt/dvely)는 EC2의 dvely-deploy 래퍼가 소유한다.
  # 여기에 중복해 두면 양쪽이 어긋날 수 있다.
  APP_NAME: dvely

jobs:
  deploy:
    name: Build and deploy ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # 테스트는 돌리지 않는다. @SpringBootTest 3종(DvelyApplicationTests,
      # ProjectSchemaTest, CloudConnectionSchemaTest)이 실제 MySQL과 Flyway 마이그레이션,
      # 그리고 gitignore된 application-local.yml의 시크릿을 요구하기 때문이다.
      # CI에서 검증하려면 MySQL 서비스 컨테이너와 시크릿 주입을 먼저 붙여야 한다.
      - name: Build bootJar
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Resolve jar path
        run: |
          set -euo pipefail
          jar=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-plain.jar' | head -1)
          if [ -z "$jar" ]; then
            echo "::error::build/libs 에서 부팅 가능한 jar를 찾지 못했습니다."
            exit 1
          fi
          cp "$jar" build/libs/app.jar
          echo "배포 대상: $jar ($(du -h "$jar" | cut -f1))"

      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          source: build/libs/app.jar
          target: /tmp/${{ env.APP_NAME }}-deploy
          strip_components: 2

      - name: Swap jar and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          envs: APP_NAME,RELEASE_TAG
          script_stop: true
          script: |
            set -euo pipefail

            # jar 교체와 재시작은 인자를 받지 않는 래퍼가 root로 수행한다.
            # install/cp 에 직접 sudo를 주면 인자 제한이 없어 무제한 root 권한이 된다.
            sudo /usr/local/sbin/dvely-deploy

            # Type=simple이라 systemd는 프로세스가 뜨는 즉시 active로 본다.
            # Flyway validate 실패나 빈 생성 오류는 그보다 늦게 터지므로
            # is-active만으로는 "배포 성공, 앱은 사망"을 걸러내지 못한다.
            # 실제로 HTTP 요청을 받을 수 있을 때까지 health를 폴링한다.
            healthy=0
            for _ in $(seq 1 45); do
              if curl -fsS -o /dev/null "http://127.0.0.1:8080/actuator/health"; then
                healthy=1
                break
              fi
              # 프로세스가 이미 죽었다면 더 기다릴 이유가 없다.
              if ! systemctl is-active --quiet "${APP_NAME}"; then
                break
              fi
              sleep 2
            done

            if [ "$healthy" -ne 1 ]; then
              echo "::error::${APP_NAME}가 90초 안에 health 응답을 내지 못했습니다. 최근 로그:"
              journalctl -u "${APP_NAME}" -n 50 --no-pager || true
              exit 1
            fi
            echo "${RELEASE_TAG} 배포 완료"
        env:
          RELEASE_TAG: ${{ github.ref_name }}
