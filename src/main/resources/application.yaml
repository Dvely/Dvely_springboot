spring:
  profiles:
    active: local
  application:
    name: qeploy

# Swagger UI readability options (SwaggerConfig.java owns the OpenAPI bean/GroupedOpenApi
# definitions; these are UI-only display preferences, no effect on the API contract itself).
springdoc:
  swagger-ui:
    # method: endpoints within a tag are sorted GET→HEAD→POST→PUT→PATCH→DELETE→OPTIONS→TRACE
    # instead of declaration order, so CRUD siblings (e.g. GET/POST/PATCH/DELETE
    # environment-variables) line up predictably regardless of where they sit in the controller.
    operations-sorter: method
    # alpha: groups/tags render alphabetically instead of registration order, matching the
    # alphabetical domain list this project's docs already use (agent, auth, chat, ...).
    tags-sorter: alpha
    # none: all operations start collapsed. With 90 endpoints across 14 controllers, an
    # auto-expanded page is unusable — collapsed-by-default lets FE devs open only what they need.
    doc-expansion: none
    # Surfaces per-call latency directly in the "Try it out" response panel, useful when chasing
    # the documented p95 latencies (e.g. preview status ~1.5s, repository defaultBranch ~500ms).
    display-request-duration: true
    # Persists the authorized Bearer token and any "Try it out" filter text across page reloads,
    # so re-testing a flow doesn't require re-pasting the JWT every time.
    persist-authorization: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 5

  jpa:
    database: mysql # 사용할 데이터베이스 유형 지정 (MySQL)
    database-platform: org.hibernate.dialect.MySQLDialect # Hibernate에서 사용할 MySQL 방언(dialect) 설정
    show-sql: true # 실행된 SQL 쿼리를 콘솔에 출력할지 여부 설정
    hibernate:
      ddl-auto: validate # Flyway migration 기준 스키마와 Entity 매핑 일치 여부만 검증
    properties:
      hibernate:
        format_sql: true # 출력되는 SQL 쿼리를 보기 좋게 포맷팅

# GitHub OAuth App - 유저 인증/신원
github:
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI}
    scope: "user:email read:user"
  # GitHub App - 레포 접근/설치 기반 고급 작업
  app:
    app-id: ${GITHUB_APP_ID}
    private-key: ${GITHUB_APP_PRIVATE_KEY}
    installation-redirect-uri: ${GITHUB_APP_INSTALLATION_REDIRECT_URI}
    client-id: ${GITHUB_APP_CLIENT_ID}
    client-secret: ${GITHUB_APP_CLIENT_SECRET}

# 서비스용 JWT (클라이언트에게 발급)
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}

# OAuth Token 암호화 (AES-256-GCM)
encrypt:
  secret: ${ENCRYPT_SECRET}

# 프론트엔드 URL (GitHub App 설치 완료 후 리다이렉트)
frontend:
  redirect-url: ${FRONTEND_REDIRECT_URL:http://localhost:5173}

qeploy:
  cors:
    allowed-origins: ${QEPLOY_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${QEPLOY_CORS_ALLOWED_ORIGIN_PATTERNS:}
  preview:
    gateway-base-url: ${QEPLOY_PREVIEW_GATEWAY_BASE_URL:http://localhost:8080}
    ttl: ${QEPLOY_PREVIEW_TTL:30m}
    cleanup-interval-ms: ${QEPLOY_PREVIEW_CLEANUP_INTERVAL_MS:60000}
  agent:
    worker:
      poll-interval-ms: ${QEPLOY_AGENT_WORKER_POLL_INTERVAL_MS:1000}
      heartbeat-interval-ms: ${QEPLOY_AGENT_WORKER_HEARTBEAT_INTERVAL_MS:30000}
      # ADR-Y3 (#55): backoff applied to a task's next_run_at after the executor pool rejects its
      # submission (dispatch-time, not execution-time, failure) — keeps a saturated pool from
      # hot-looping claim<->reject every poll-interval-ms.
      dispatch-reject-backoff-ms: ${QEPLOY_AGENT_WORKER_DISPATCH_REJECT_BACKOFF_MS:5000}
    approval:
      # ADR-Y2 (#55): StuckApprovalSweeper's poll interval — defense-in-depth recovery for the D1
      # write-skew stuck state (structurally prevented by ADR-Y1's lock hierarchy; this is the
      # safety net for anything that slips through anyway).
      sweep-interval-ms: ${QEPLOY_AGENT_APPROVAL_SWEEP_INTERVAL_MS:60000}
  deployment:
    worker:
      poll-interval-ms: ${QEPLOY_DEPLOYMENT_WORKER_POLL_INTERVAL_MS:1000}
      heartbeat-interval-ms: ${QEPLOY_DEPLOYMENT_WORKER_HEARTBEAT_INTERVAL_MS:30000}
  cloud-connection:
    worker:
      poll-interval-ms: ${QEPLOY_CLOUD_CONNECTION_WORKER_POLL_INTERVAL_MS:1000}
  webhook:
    worker:
      poll-interval-ms: ${QEPLOY_WEBHOOK_WORKER_POLL_INTERVAL_MS:1000}
  chat:
    trash-cleanup-interval-ms: ${QEPLOY_CHAT_TRASH_CLEANUP_INTERVAL_MS:3600000}

# Cloudflare DNS - managed subdomain automation
cloudflare:
  api-token:
  zone-id:
  managed-domain: qeploy.com
  managed-target:
  api-base-url: https://api.cloudflare.com/client/v4
  ttl: 1
  proxied: true
