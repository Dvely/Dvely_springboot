spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

cloudflare:
  api-token:
  zone-id:
  managed-domain: qeploy.com
  managed-target:
  api-base-url: https://api.cloudflare.com/client/v4
  ttl: 1
  proxied: true

qeploy:
  cors:
    allowed-origins: ${QEPLOY_CORS_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${QEPLOY_CORS_ALLOWED_ORIGIN_PATTERNS:}
  ai:
    anthropic:
      api-key: ${QEPLOY_AI_ANTHROPIC_API_KEY:${ANTHROPIC_API_KEY:}}
      model: ${QEPLOY_AI_ANTHROPIC_MODEL:claude-opus-4-5-20251101}
    openai:
      api-key: ${QEPLOY_AI_OPENAI_API_KEY:${OPENAI_API_KEY:}}
      model: ${QEPLOY_AI_OPENAI_MODEL:gpt-4o}
